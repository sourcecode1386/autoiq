<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Health Score</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'DM Sans', sans-serif;
  background: white;
  width: 100%;
  height: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: white;
  padding: 10px 14px 12px;
  width: 100%;
  max-width: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card-title {
  font-size: 10px;
  font-weight: 700;
  color: #64748b;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

/* GAUGE */
.gauge-wrap {
  position: relative;
  width: 160px;
  height: 88px;
  flex-shrink: 0;
}
.gauge-wrap svg { width: 160px; height: 88px; overflow: visible; }
.gauge-min, .gauge-max {
  position: absolute;
  top: 2px;
  font-size: 10px;
  font-weight: 600;
  color: #cbd5e1;
  font-family: 'DM Mono', monospace;
}
.gauge-min { left: 0; }
.gauge-max { right: 0; }

/* SCORE */
.score-row {
  display: flex;
  align-items: baseline;
  gap: 3px;
  margin-top: -2px;
  margin-bottom: 4px;
}
.score-number {
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -2px;
}
.score-denom {
  font-size: 13px;
  font-weight: 400;
  color: #94a3b8;
}

/* DIVIDER */
.divider {
  width: 100%;
  height: 1px;
  background: #f1f5f9;
  margin-bottom: 8px;
}

/* CONTEXT BLOCK */
.context-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  width: 100%;
}

/* vs prior line */
.prior-line {
  font-size: 12px;
  color: #64748b;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 4px;
}
.prior-delta {
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}
.prior-label {
  font-size: 11px;
  color: #94a3b8;
}

/* trajectory line */
.trajectory-line {
  font-size: 11px;
  color: #94a3b8;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 4px;
}
.trajectory-line .traj-text {
  font-style: italic;
}

/* band pill */
.band-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 11px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 6px;
}
.band-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="card-title">Avg Revenue Health</div>
  <div class="gauge-wrap">
    <svg viewBox="0 0 160 90" id="gaugeSvg"></svg>
    <div class="gauge-min">0</div>
    <div class="gauge-max">100</div>
  </div>
  <div class="score-row">
    <span class="score-number" id="scoreNum">72</span>
    <span class="score-denom">/ 100</span>
  </div>
  <div class="divider"></div>
  <div class="context-block">
    <div class="prior-line">
      <span class="prior-delta" id="deltaVal"></span>
      <span class="prior-label">vs. prior period</span>
    </div>
    <div class="trajectory-line">
      <span id="trajIcon"></span>
      <span class="traj-text" id="trajText"></span>
    </div>
  </div>
  <div class="band-pill" id="bandPill">
    <div class="band-dot" id="bandDot"></div>
    <span id="bandText"></span>
  </div>
</div>

<script>
// URL params: ?score=72&delta=5
// delta = pts change vs prior period (positive = up, negative = down)
const params = new URLSearchParams(window.location.search);
const score  = Math.min(100, Math.max(0, parseInt(params.get('score')) || 72));
const delta  = parseInt(params.get('delta') ?? '5');

function scoreColor(s) {
  if (s >= 85) return '#06b6d4';
  if (s >= 70) return '#059669';
  if (s >= 50) return '#d97706';
  return '#dc2626';
}
function scoreBand(s) {
  if (s >= 85) return 'Strong';
  if (s >= 70) return 'Good';
  if (s >= 50) return 'Moderate';
  return 'Low';
}
function scoreBandBg(s) {
  if (s >= 85) return 'rgba(6,182,212,0.1)';
  if (s >= 70) return 'rgba(5,150,105,0.1)';
  if (s >= 50) return 'rgba(217,119,6,0.1)';
  return 'rgba(220,38,38,0.1)';
}
function trajectoryText(s, d) {
  // combine current band + delta direction for plain english
  if (s >= 85 && d >= 0) return { icon: '→', text: 'Strong & holding' };
  if (s >= 85 && d < 0)  return { icon: '↘', text: 'Strong, slight pullback' };
  if (s >= 70 && d > 2)  return { icon: '↗', text: 'Stable growth trajectory' };
  if (s >= 70 && d >= 0) return { icon: '→', text: 'Stable, holding steady' };
  if (s >= 70 && d < 0)  return { icon: '↘', text: 'Stable, declining trend' };
  if (s >= 50 && d > 2)  return { icon: '↗', text: 'Recovering, positive trend' };
  if (s >= 50 && d >= 0) return { icon: '→', text: 'Moderate, watch closely' };
  if (s >= 50 && d < 0)  return { icon: '↓', text: 'Declining, needs attention' };
  return { icon: '↓', text: 'At risk — action recommended' };
}

function buildGauge(score) {
  const svg = document.getElementById('gaugeSvg');
  svg.innerHTML = '';
  const cx = 80, cy = 87, r = 68, strokeW = 11;
  const color = scoreColor(score);

  function polar(angle, radius) {
    return { x: cx + radius * Math.cos(angle), y: cy - radius * Math.sin(angle) };
  }
  function arc(sa, ea, rad) {
    const s = polar(sa, rad), e = polar(ea, rad);
    const large = (sa - ea) > Math.PI ? 1 : 0;
    return `M ${s.x} ${s.y} A ${rad} ${rad} 0 ${large} 1 ${e.x} ${e.y}`;
  }

  const scoreAngle = Math.PI - (score / 100) * Math.PI;

  // track
  const track = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  track.setAttribute('d', arc(Math.PI, 0, r));
  track.setAttribute('fill', 'none');
  track.setAttribute('stroke', '#f1f5f9');
  track.setAttribute('stroke-width', strokeW);
  track.setAttribute('stroke-linecap', 'round');
  svg.appendChild(track);

  // subtle zone bands
  [
    { from: 0,  to: 50,  col: 'rgba(220,38,38,0.07)' },
    { from: 50, to: 70,  col: 'rgba(217,119,6,0.07)' },
    { from: 70, to: 85,  col: 'rgba(5,150,105,0.07)' },
    { from: 85, to: 100, col: 'rgba(6,182,212,0.07)' },
  ].forEach(z => {
    const zp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    zp.setAttribute('d', arc(Math.PI - (z.from/100)*Math.PI, Math.PI - (z.to/100)*Math.PI, r));
    zp.setAttribute('fill', 'none');
    zp.setAttribute('stroke', z.col);
    zp.setAttribute('stroke-width', strokeW + 8);
    zp.setAttribute('stroke-linecap', 'butt');
    svg.appendChild(zp);
  });

  // colored fill
  if (score > 0) {
    const fill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fill.setAttribute('d', arc(Math.PI, scoreAngle, r));
    fill.setAttribute('fill', 'none');
    fill.setAttribute('stroke', color);
    fill.setAttribute('stroke-width', strokeW);
    fill.setAttribute('stroke-linecap', 'round');
    svg.appendChild(fill);
  }

  // band boundary ticks
  [0, 50, 70, 85, 100].forEach(val => {
    const angle = Math.PI - (val / 100) * Math.PI;
    const inner = polar(angle, r - strokeW/2 - 1);
    const outer = polar(angle, r + strokeW/2 + 4);
    const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    tick.setAttribute('x1', inner.x); tick.setAttribute('y1', inner.y);
    tick.setAttribute('x2', outer.x); tick.setAttribute('y2', outer.y);
    tick.setAttribute('stroke', '#e2e8f0');
    tick.setAttribute('stroke-width', 1.5);
    svg.appendChild(tick);
  });

  // needle tip
  const tip = polar(scoreAngle, r);
  const needle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  needle.setAttribute('cx', tip.x);
  needle.setAttribute('cy', tip.y);
  needle.setAttribute('r', 7);
  needle.setAttribute('fill', color);
  needle.setAttribute('stroke', 'white');
  needle.setAttribute('stroke-width', 2.5);
  svg.appendChild(needle);
}

// ── Render
buildGauge(score);
const col = scoreColor(score);

// score number
document.getElementById('scoreNum').textContent = score;
document.getElementById('scoreNum').style.color  = col;

// delta vs prior
const deltaEl   = document.getElementById('deltaVal');
const sign      = delta >= 0 ? '+' : '';
const deltaCol  = delta >= 0 ? '#059669' : '#dc2626';
const deltaArrow = delta >= 0 ? '↑ ' : '↓ ';
deltaEl.textContent = deltaArrow + sign + delta + ' pts';
deltaEl.style.color = deltaCol;

// trajectory
const traj = trajectoryText(score, delta);
const trajIcon = document.getElementById('trajIcon');
const trajText = document.getElementById('trajText');
trajIcon.textContent = traj.icon;
trajIcon.style.color = col;
trajText.textContent = traj.text;

// band pill
const pill = document.getElementById('bandPill');
pill.style.background = scoreBandBg(score);
pill.style.color = col;
document.getElementById('bandDot').style.background = col;
document.getElementById('bandText').textContent = scoreBand(score);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Health Score</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.card {
  background: white;
  padding: 24px 20px 16px;
  width: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card-title {
  font-size: 14px;
  font-weight: 700;
  color: #1a2e45;
  text-align: center;
  margin-bottom: 16px;
}
.gauge-wrap {
  position: relative;
  width: 180px;
  height: 100px;
  margin-bottom: 2px;
}
.gauge-wrap svg { width: 180px; height: 100px; overflow: visible; }
.gauge-min, .gauge-max {
  position: absolute;
  top: 2px;
  font-size: 12px;
  font-weight: 600;
  color: #94a3b8;
}
.gauge-min { left: 0; }
.gauge-max { right: 0; }
.score-display {
  text-align: center;
  margin-top: 4px;
  margin-bottom: 10px;
}
.score-number {
  font-size: 46px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -2px;
}
.score-denom {
  font-size: 15px;
  font-weight: 400;
  color: #94a3b8;
}
.range-text {
  font-size: 11.5px;
  color: #64748b;
  text-align: center;
  line-height: 1.6;
  margin-bottom: 12px;
  max-width: 175px;
}
.range-text strong { font-weight: 700; }
.band-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 14px;
}
.band-dot { width: 7px; height: 7px; border-radius: 50%; }
.more-info {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: #94a3b8;
  cursor: pointer;
  align-self: flex-end;
}
.info-icon {
  width: 15px; height: 15px; border-radius: 50%;
  border: 1.5px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
}

/* tooltip popup */
.tooltip-box {
  display: none;
  position: fixed;
  bottom: 20px; right: 20px;
  background: #1a2e45;
  color: #f1f5f9;
  border-radius: 10px;
  padding: 14px 16px;
  width: 190px;
  font-size: 11px;
  line-height: 1.6;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  z-index: 10;
}
.tooltip-box.visible { display: block; }
.tooltip-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.tooltip-row:last-child { margin-bottom: 0; }
.tooltip-label { color: #94a3b8; }
.tooltip-val { font-weight: 600; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<div class="card">
  <div class="card-title">Avg Revenue Health</div>
  <div class="gauge-wrap">
    <svg viewBox="0 0 180 100" id="gaugeSvg"></svg>
    <div class="gauge-min">0</div>
    <div class="gauge-max">100</div>
  </div>
  <div class="score-display">
    <span class="score-number" id="scoreNum">—</span><span class="score-denom"> / 100</span>
  </div>
  <div class="range-text">
    Most portfolios score between
    <strong id="rangeA" style="color:#059669">65</strong> and
    <strong id="rangeB" style="color:#059669">80</strong>
  </div>
  <div class="band-label" id="bandLabel">
    <div class="band-dot" id="bandDot"></div>
    <span id="bandText">—</span>
  </div>
  <div class="more-info" onclick="toggleTooltip()">
    More Information <div class="info-icon">i</div>
  </div>
</div>

<div class="tooltip-box" id="tooltipBox">
  <div style="font-weight:700;margin-bottom:8px;color:white">Score Components</div>
  <div class="tooltip-row"><span class="tooltip-label">Stability (Volatility)</span><span class="tooltip-val" style="color:#06b6d4">~35%</span></div>
  <div class="tooltip-row"><span class="tooltip-label">Forecast Growth</span><span class="tooltip-val" style="color:#06b6d4">~45%</span></div>
  <div class="tooltip-row"><span class="tooltip-label">Recent Momentum</span><span class="tooltip-val" style="color:#06b6d4">~20%</span></div>
  <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);font-size:10px;color:#64748b">
    Scores weighted across all active parent clients
  </div>
</div>

<script>
// ── Read score from URL: ?score=72
// Falls back to 72 if not provided
const params = new URLSearchParams(window.location.search);
const score = Math.min(100, Math.max(0, parseInt(params.get('score')) || 72));

function scoreColor(s) {
  if (s >= 85) return '#06b6d4';
  if (s >= 70) return '#059669';
  if (s >= 50) return '#d97706';
  return '#dc2626';
}
function scoreBand(s) {
  if (s >= 85) return 'Strong';
  if (s >= 70) return 'Good';
  if (s >= 50) return 'Moderate';
  return 'Low';
}
function scoreBandBg(s) {
  if (s >= 85) return 'rgba(6,182,212,0.1)';
  if (s >= 70) return 'rgba(5,150,105,0.1)';
  if (s >= 50) return 'rgba(217,119,6,0.1)';
  return 'rgba(220,38,38,0.1)';
}

function buildGauge(score) {
  const svg = document.getElementById('gaugeSvg');
  const cx = 90, cy = 98, r = 75, strokeW = 13;
  const color = scoreColor(score);

  function polarToXY(angle, radius) {
    return { x: cx + radius * Math.cos(angle), y: cy - radius * Math.sin(angle) };
  }
  function arcPath(startA, endA, rad) {
    const s = polarToXY(startA, rad);
    const e = polarToXY(endA, rad);
    const large = (startA - endA) > Math.PI ? 1 : 0;
    return `M ${s.x} ${s.y} A ${rad} ${rad} 0 ${large} 1 ${e.x} ${e.y}`;
  }

  const scoreAngle = Math.PI - (score / 100) * Math.PI;

  // gray track
  const track = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  track.setAttribute('d', arcPath(Math.PI, 0, r));
  track.setAttribute('fill', 'none');
  track.setAttribute('stroke', '#e2e8f0');
  track.setAttribute('stroke-width', strokeW);
  track.setAttribute('stroke-linecap', 'round');
  svg.appendChild(track);

  // "typical range" band (65–80)
  const rangeStart = Math.PI - (65 / 100) * Math.PI;
  const rangeEnd   = Math.PI - (80 / 100) * Math.PI;
  const rangeBand = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  rangeBand.setAttribute('d', arcPath(rangeStart, rangeEnd, r));
  rangeBand.setAttribute('fill', 'none');
  rangeBand.setAttribute('stroke', 'rgba(100,116,139,0.18)');
  rangeBand.setAttribute('stroke-width', strokeW + 6);
  rangeBand.setAttribute('stroke-linecap', 'butt');
  svg.appendChild(rangeBand);

  // colored fill arc
  if (score > 0) {
    const fill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fill.setAttribute('d', arcPath(Math.PI, scoreAngle, r));
    fill.setAttribute('fill', 'none');
    fill.setAttribute('stroke', color);
    fill.setAttribute('stroke-width', strokeW);
    fill.setAttribute('stroke-linecap', 'round');
    svg.appendChild(fill);
  }

  // tick marks
  [0, 25, 50, 75, 100].forEach(val => {
    const angle = Math.PI - (val / 100) * Math.PI;
    const inner = polarToXY(angle, r - strokeW / 2 - 2);
    const outer = polarToXY(angle, r + strokeW / 2 + 2);
    const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    tick.setAttribute('x1', inner.x); tick.setAttribute('y1', inner.y);
    tick.setAttribute('x2', outer.x); tick.setAttribute('y2', outer.y);
    tick.setAttribute('stroke', '#cbd5e1');
    tick.setAttribute('stroke-width', 1.5);
    svg.appendChild(tick);
  });

  // needle tip
  const tipPos = polarToXY(scoreAngle, r);
  const needle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  needle.setAttribute('cx', tipPos.x);
  needle.setAttribute('cy', tipPos.y);
  needle.setAttribute('r', 8);
  needle.setAttribute('fill', color);
  needle.setAttribute('stroke', 'white');
  needle.setAttribute('stroke-width', 3);
  svg.appendChild(needle);
}

function toggleTooltip() {
  document.getElementById('tooltipBox').classList.toggle('visible');
}

// ── Render
buildGauge(score);
const col = scoreColor(score);
document.getElementById('scoreNum').textContent = score;
document.getElementById('scoreNum').style.color = col;
document.getElementById('rangeA').style.color = col;
document.getElementById('rangeB').style.color = col;
const band = document.getElementById('bandLabel');
band.style.background = scoreBandBg(score);
band.style.color = col;
document.getElementById('bandDot').style.background = col;
document.getElementById('bandText').textContent = scoreBand(score);
</script>
</body>
</html>
